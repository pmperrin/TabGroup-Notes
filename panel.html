<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Group Post-its</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="header-container">
    <div class="header">
      <h1 data-i18n="panelTitle">Mes Post-its</h1>
      <p class="subtitle" data-i18n="panelSubtitle">Notes par groupe d'onglets</p>
    </div>
    <button id="filter-btn" class="toggle-btn" data-active="false" title="Basculer le mode focus" data-i18n="filterAll">
      👁️ Tous
    </button>
  </div>
  
  <div id="groups-container">
    <!-- Active groups dynamically injected -->
  </div>

  <div id="archive-section" style="display: none; margin-top: 32px;">
    <div class="header-archive">
      <h2 data-i18n="archiveTitle">Archives</h2>
      <p class="subtitle" data-i18n="archiveSubtitle">Notes de groupes fermés</p>
    </div>
    <div id="archived-container">
      <!-- Archived groups dynamically injected -->
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
